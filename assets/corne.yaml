layout: {zmk_keyboard: corne}
layers:
  default: [TAB, Q, W, E, R, T, '(ZMK HID USAGE(HID USAGE KEY, HID USAGE KEY KEYBOARD Y))', U, I, O, P, BSPC, LCTRL, A, S, D, F, G, H, J, K, L, '((LS(ZMK HID USAGE(HID
      USAGE KEY, HID USAGE KEY KEYBOARD COMMA AND LESS THAN))))', '((ZMK HID USAGE(HID USAGE KEY, HID USAGE KEY KEYBOARD MINUS AND UNDERSCORE)))', LSHFT, '(ZMK HID
